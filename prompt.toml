# prompt.toml - プロンプト構成 (旧 prompt_v02.toml から改名、v04 schema)。
# build_prompt() がこのファイルを読み、各セクションから抽選 → カンマ連結で prompt を作る。
# 重み付き選択は random.choices、均等選択は random.choice。
# `**word**` 等の強調記法は最終的に normalize_emphasis で `(word:1.3)` 形式に変換される。
#
# 各セクションのエントリは末尾に **LoRA キーワード** (カンマ区切り) を追加できる:
#   who         : [character, weight, has_wearing, has_motion?, has_where?, many?, kw?]   (v05)
#                  ※ index 1 が int weight。旧 v01-v04 形式 (weight 無し) も自動判別で互換。
#   wearing     : [clothing, weight, kw?]
#   with_items  : [item, weight, kw?]
#   motion      : [motion, weight, kw?]
#   at          : "place" (str、weight=1 デフォルト) または [place, weight, kw?]
# 採用されたエントリの kw を全部集めて、生成のたびに pick_lora_by_keywords で:
#   - 97% : LoRA 名 (stem) に kw が部分一致するものから抽選
#   - 3%  : 全 LoRA からランダム抽選 (= マッチを意図的に避ける)
# kw 列を省略した既存エントリ ([value, weight] のみ) は従来抽選にフォールバック。

# 誰が: [character, has_wearing, has_motion, has_where, many, lora_keywords]
# - has_wearing=true → 下の [wearing] 抽選をスキップ
#                      (キャラに服装情報が内包されている前提、例: "school wear woman" / "naked woman")
# - has_motion=true → 下の [motion] セクションをスキップ (キャラ文字列に動作が内包されている)
# - has_where=true  → 下の [at] セクションをスキップ
#                      (キャラ文字列に場所が内包されている前提、例:
#                       "a woman ware swimsuit at pool" / "a woman ware swimsuit in sea")
# - many=true       → 複数人エントリ (キャラ文字列が "2 women" 等)。生成側が横長キャンバス
#                      (--many-width x --many-height、既定 1216x832) に切替えて人物融合を抑える
# - 後方互換 (index4 の 型 bool/str で v04/v03 を判別):
#     5 要素 [char, has_wearing, has_motion, has_where, kw_str]   … v03 形式 (index4=str、many=false)
#     4 要素 [char, has_wearing, has_motion, kw_str]              … v02 形式 (has_where=false)
#     3 要素 [char, has_motion, kw_str]                           … 旧 v01 形式 (kw のみ、bool は has_motion 扱い)
# 例: ["**2 women kissing**", false, true, false, true, "kiss"]
#      ← many=true で横長化、wearing スキップ
# 例: ["**a woman ware swimsuit at pool**", false, true, true, false, "swimsuit, pool"]
#      ← wearing スキップ + at スキップ、単独人物
# 例: ["**a woman**", false, false, false, false, ""]
#      ← 服装も場所もニュートラル、全セクション通常抽選
# 1 つを均等ランダム抽選
who = [
    # plane
    ["**a woman or two women**", 20, false, false, false, true, ""],
]

# 何を着て: [clothing, weight] または [clothing, weight, lora_keywords]
# 例: ["swimsuit", 5, "swimsuit"]
# - "nothing" → "naked" を 1 句として追加 (= 裸を明示)
# - その他 → "wearing {clothing}" を 1 句として追加
# 1 つを重み抽選
wearing = [
    ["nothing", 30, "naked"],
    ["dress", 30, "dress"],
    ["lingerie", 30, "lingerie"],
    ["swimsuit", 30, "swimsuit"],
]

# with アクセサリ/状況: [item, weight] または [item, weight, lora_keywords]
# 例: ["jewelry", 5, "jewelry"]
# - 最大 3 回 重み抽選 (with replacement)、重複は dedupe、"nothing" は無視
# - 採用された各 item は "with {item}" として個別句に展開される
# - 採用された entry の kw もそれぞれ LoRA キーワードに加わる
with_items = [
    ["nothing", 50, ""],
    ["jewely", 50, "jewel"],
    ["necklace", 5, "jewel"],
    ["ear piace", 5, "jewel"],
]

# 動作: [motion, weight] または [motion, weight, lora_keywords]
# 例: ["riding bike", 5, "bike"]
# - who.has_motion=true のときはスキップ
# 1 つを重み抽選
motion = [
    ["standing", 50, ""],
    ["squating", 50, "squat"],
    ["sitting", 50, ""],
    ["leaning", 50, ""],
    ["standing turn their back", 20, ""],
    ["sitting turn their back", 20, ""],
    ["lying", 20, ""],
    ["legs up", 20, "legs up"],
    ["open legs", 20, ""],
    ["lift leg", 10, "lift leg"],
    ["posing", 30, "pose"],
]

# at 場所: 1 つを均等ランダム抽選、"at {place}" 形式
at = [
    ["room", 30, ""],
    ["beach", 5, ""],
    ["on cauch", 10, ""],
    ["rooms bed", 10, ""],
    ["hotels bed", 10, ""],
    ["bathroom", 5, ""],
    ["transparent bathtab", 3, ""],
    ["pool side", 3, ""],
    ["palece", 3, ""],
    ["rooftop of building", 3, ""],
]

# with 明るさ・情景: 1 つを均等ランダム抽選、"with {lighting}" 形式
lighting = [
    "white lighting",
    "color lighting",
]

# 必ず prompt 末尾に付加
# リアル系: Flux は自然文に反応するので写実タグで寄せる。
# (旧 "score_9, score_8, score_7" は Pony/booru のアニメ品質タグでイラスト化の主因だったため撤去)
# Flux は CFG=1 で negative が効かないため、手/顔/身体の良好さは **positive に明記**して担保する
# (ADetailer の代替: "bad hands を避ける" ではなく "detailed hands, five fingers" を肯定文で指定)。
positive_always = "photorealistic, raw photo, realistic detailed skin, skin pores, natural lighting, sharp focus, 85mm photograph, natural color, detailed face, clear symmetric eyes, detailed hands with five fingers, natural hand pose, anatomically correct body, natural body proportions"

# 必ず negative_prompt の本体になる (build_prompt は negative も返す)
negative_always = "synthesis body, lowres, bad anatomy, worst quality, extra hand, not 5-fingers, malformed body, diffrent faces upper body and under body, malformed feet, extra feet, missing feet, deformed limbs, duplicate, clone, repeated, collage, panels, grid, tiling, seamless pattern, complementary colors, duotone, two-tone, color grading, oversaturated, don't water come out of hands, don't water come out of dildos."
